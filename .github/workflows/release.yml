name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependency
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build portable package
        shell: pwsh
        run: .\build.ps1

      - name: Create SHA256 file
        shell: pwsh
        run: |
          $hash = Get-FileHash "release/DD Manager Portable.zip" -Algorithm SHA256
          "$($hash.Hash) *DD Manager Portable.zip" | Set-Content "release/DD Manager Portable.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/DD Manager Portable.zip
            release/DD Manager Portable.sha256
